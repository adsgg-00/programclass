<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臺灣海域漁獲動態視覺圖 - 期末專案</title>
    
    <!-- 引入 Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- 引入 Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { background-color: #f8f9fa; font-family: 'Google Sans', Roboto, Arial, sans-serif; }
        
        /* 新增：頂部滿版大圖設計 (Hero Banner) */
        .hero-section {
            width: 100%;
            height: 45vh; /* 佔據螢幕45%高度 */
            min-height: 350px;
            background-image: url('蘭嶼.jpg'); /* 替換為你的蘭嶼圖片 */
            background-size: cover;
            background-position: center;
            background-color: #2c3e50; /* 預設背景色 */
            position: relative;
        }
        .hero-overlay {
            background-color: rgba(0, 0, 0, 0.45); /* 黑色半透明遮罩，確保文字清楚 */
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
            text-align: center;
        }
        .shadow-text { text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.7); }

        .map-container { position: relative; height: 600px; width: 100%; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 4px solid white; }
        #map { height: 100%; width: 100%; z-index: 1; }
        .season-controls { position: absolute; right: 15px; top: 15px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        .season-btn { width: 45px; height: 45px; border-radius: 50%; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.2); transition: all 0.2s; }
        .fish-img-large { width: 100%; height: 300px; object-fit: contain; border-radius: 8px; background-color: #ffffff; }
        #emptyState { min-height: 200px; display: flex; align-items: center; justify-content: center; border: 2px dashed #dee2e6; border-radius: 12px; color: #6c757d; }
        @media (min-width: 992px) { .custom-w-75 { width: 75% !important; } }
        .season-badge { font-size: 0.8rem; margin-right: 8px; }
    </style>
</head>
<body>

    <!-- 更新：改用滿版大圖區塊取代原本的 Navbar -->
    <header class="hero-section">
        <div class="hero-overlay">
            <h1 class="fw-bold text-white mb-3 shadow-text">臺灣海域漁獲動態視覺圖</h1>
            <p class="fs-5 text-white mb-4 shadow-text">結合海洋保育及責任消費，引導大眾「吃對海鮮」。</p>
            <span class="badge bg-info text-dark fs-6 px-4 py-2 shadow-sm">SDG 14 永續海洋與保育</span>
        </div>
    </header>

    <div class="container my-5">
        <div class="row mb-4 justify-content-center">
            <div class="col-12 col-md-10 custom-w-75">
                <div class="map-container">
                    <div id="map"></div>
                    <div class="season-controls">
                        <!-- 預設改為顯示夏季 -->
                        <button class="btn btn-light season-btn" onclick="updateSeason('春', this)">春</button>
                        <button class="btn btn-primary season-btn" onclick="updateSeason('夏', this)">夏</button>
                        <button class="btn btn-light season-btn" onclick="updateSeason('秋', this)">秋</button>
                        <button class="btn btn-light season-btn" onclick="updateSeason('冬', this)">冬</button>
                    </div>
                </div>
                <p class="text-muted small mt-3 text-center">💡 提示：點擊右上角切換季節，並點擊地圖圓點查看該海域詳細資訊。</p>
            </div>
        </div>

        <div class="row pb-5 justify-content-center" id="infoSection">
            <div class="col-12 col-md-10 custom-w-75">
                <h3 class="fw-bold mb-3 border-bottom pb-2">📍 漁獲詳細資訊</h3>
                <div id="emptyState" class="bg-white"><h5>👆 請在地圖上選擇一個海域</h5></div>
                <div class="card shadow-sm border-0 d-none" id="fishDetailCard">
                    <div class="row g-0">
                        <div class="col-md-5 p-3">
                            <div class="bg-light rounded text-center h-100 d-flex align-items-center justify-content-center" id="cardImgContainer"></div>
                        </div>
                        <div class="col-md-7">
                            <div class="card-body p-4">
                                <div class="d-flex align-items-center mb-2">
                                    <span id="cardSeasonBadge" class="badge rounded-pill season-badge">季節</span>
                                    <h2 class="card-title fw-bold text-dark mb-0 me-3" id="cardTitle">魚種名稱</h2>
                                    <span class="badge bg-success fs-6" id="cardStatus">供給正常</span>
                                </div>
                                <p class="text-muted small fst-italic mb-3" id="cardScientificName"></p>
                                <p class="text-muted mb-4"><span class="badge bg-secondary me-2" id="cardLabel">來源</span> <span id="cardRegion"></span></p>
                                <h5 class="fw-bold text-primary mb-3">🌱 生態指標與保育建議</h5>
                                <ul class="list-group list-group-flush" id="cardEcoList"></ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>

        // 儲存地圖上目前的標記點，方便切換季節時清除
        var currentMarkers = [];

        // 核心漁獲資料庫
        var regions = [
            // ================== 春季 (10種) ==================
            { season: "春季", seasonColor: "bg-success", name: "東部海域 (花東外海)", pos: [23.5, 121.8], fish: "鬼頭刀 (飛烏虎)", scientificName: "Mahi-mahi / Coryphaena hippurus", status: "供給正常", imgSrc: "春季/Coryphaena hippurus.JPG", label: "野生捕撈", ecoList: ["生長極為快速，約一年即可達成熟體型。", "屬於表層洄游性魚類，適合替代大型鮪魚。", "建議選擇「一支釣」等友善漁法來源。"] },
            { season: "春季", seasonColor: "bg-success", name: "南部海域 (屏東東港)", pos: [22.4, 120.4], fish: "櫻花蝦", scientificName: "Sakura shrimp / Lucensosergia lucens", status: "供給正常", imgSrc: "春季/Sakura shrimp.jpg", label: "野生捕撈", ecoList: ["台灣特有資源，實施嚴格的總量管制與禁漁期。", "屬於食物鏈底層，資源恢復快。", "捕撈規範完善，是永續漁業的良好典範。"] },
            { season: "春季", seasonColor: "bg-success", name: "中南部海域 (雲嘉南沿海)", pos: [23.3, 120.1], fish: "臺灣鯛 (改良吳郭魚)", scientificName: "Taiwan Tilapia / Oreochromis spp.", status: "供給正常", imgSrc: "春季/Taiwan Tilapia.JPG", label: "在地養殖", ecoList: ["屬於雜食性，對人工飼料適應力極強。", "抗病力高，生長週期短。", "養殖技術極度成熟，能穩定供應優質蛋白質。"] },
            { season: "春季", seasonColor: "bg-success", name: "東部海域", pos: [24.0, 122.0], fish: "正鰹 (煙仔魚)", scientificName: "Skipjack tuna / Katsuwonus pelamis", status: "供給正常", imgSrc: "春季/Skipjack tuna.jpg", label: "野生捕撈", ecoList: ["生長快速且繁殖力強的中表層洄游魚類。", "數量相對龐大，資源尚屬穩定。", "建議選擇單線釣法或曳繩釣捕獲的來源。"] },
            { season: "春季", seasonColor: "bg-success", name: "南部海域 (高雄、屏東)", pos: [22.6, 120.25], fish: "石斑魚", scientificName: "Grouper / Epinephelus spp.", status: "供給正常", imgSrc: "春季/Grouper.jpg", label: "在地養殖", ecoList: ["台灣室內外循環水養殖技術成熟。", "可減少對野生珊瑚礁魚類的捕撈壓力。", "需注意飼料來源是否符合永續標準。"] },
            { season: "春季", seasonColor: "bg-success", name: "東北角海域 (宜蘭蘇澳)", pos: [24.6, 121.9], fish: "鯖魚 (花飛)", scientificName: "Chub mackerel / Scomber japonicus", status: "需注意產量", imgSrc: "春季/Chub mackerel.jpg", label: "野生捕撈", ecoList: ["屬於食物鏈中下層，原本資源豐富。", "近年因過度捕撈導致體型逐漸縮小。", "建議消費者選擇體型較大（超過20公分）的成魚。"] },
            { season: "春季", seasonColor: "bg-success", name: "東部海域 (蘭嶼、綠島)", pos: [22.1, 121.5], fish: "飛魚", scientificName: "Flying fish / Exocoetidae", status: "需注意產量", imgSrc: "春季/Flying fish.jpg", label: "野生捕撈", ecoList: ["具有季節性洄游特性的表層魚類。", "傳統達悟族捕捉方式具備永續精神。", "應避免使用流刺網大規模商業捕撈。"] },
            { season: "春季", seasonColor: "bg-success", name: "東部海域 (花蓮)", pos: [23.9, 121.7], fish: "曼波魚 (翻車魚)", scientificName: "Ocean sunfish / Mola mola", status: "短缺警示", imgSrc: "春季/Ocean sunfish.jpg", label: "野生捕撈", ecoList: ["行動緩慢，常成為定置網的無辜混獲物。", "屬於大洋性魚類，族群數量與生態資訊仍不足。", "缺乏有效管理機制，不建議食用。"] },
            { season: "春季", seasonColor: "bg-success", name: "南部海域 (屏東東港)", pos: [22.3, 120.35], fish: "黑鮪魚", scientificName: "Pacific bluefin tuna / Thunnus orientalis", status: "短缺警示", imgSrc: "春季/Pacific bluefin tuna.jpg", label: "野生捕撈", ecoList: ["屬於海洋頂級掠食者，生長極度緩慢且壽命長。", "累積重金屬風險較高。", "長期面臨嚴重過度捕撈壓力，野生族群枯竭。"] },

            // ================== 夏季 (10種) ==================

            { season: "夏季", seasonColor: "bg-danger", name: "西部海域 (嘉義外海)", pos: [23.45, 120.0], fish: "牡蠣 (蚵仔)", scientificName: "Pacific oyster / Magallana gigas", status: "供給正常", imgSrc: "夏季/Crassostrea_gigas.jpg", label: "在地養殖", ecoList: ["濾食性雙殼貝類，無須投餵人工飼料。", "具有淨化水質的功能，對海洋環境極為友善。", "在地生產，碳足跡極低。"] },
            { season: "夏季", seasonColor: "bg-danger", name: "東北角海域 (貢寮)", pos: [25.05, 122.0], fish: "九孔 (台灣鮑魚)", scientificName: "Small abalone / Haliotis diversicolor", status: "供給正常", imgSrc: "夏季/Small_Abalone.jpg", label: "在地養殖", ecoList: ["以天然海藻為食，不需依賴魚粉飼料。", "潮間帶養殖池設計對海岸生態影響較小。", "在地養殖存活率與品質皆已提升。"] },
            { season: "夏季", seasonColor: "bg-danger", name: "西南部海域", pos: [23.0, 120.05], fish: "金目鱸魚", scientificName: "Barramundi / Lates calcarifer", status: "供給正常", imgSrc: "夏季/Barramundi.jpg", label: "在地養殖", ecoList: ["生長迅速適應力強，是台灣重要養殖魚種。", "能有效將植物性蛋白轉換為肉類。", "減少野生肉食性魚類的依賴。"] },

            { season: "夏季", seasonColor: "bg-danger", name: "北部海域 (基隆外海)", pos: [25.2, 121.8], fish: "鎖管 (小卷 / 透抽)", scientificName: "Swordtip squid / Uroteuthis edulis", status: "需注意產量", imgSrc: "夏季/Swordtip squid.jpg", label: "野生捕撈", ecoList: ["生命週期短、繁殖力強，資源恢復相對較快。", "近年氣候變遷與捕撈壓力使體型縮水。", "建議選擇長度超過 15 公分的成體。"] },
            { season: "夏季", seasonColor: "bg-danger", name: "北部海域 (萬里)", pos: [25.25, 121.65], fish: "遠海梭子蟹 (花蟹)", scientificName: "Blue swimming crab / Portunus pelagicus", status: "需注意產量", imgSrc: "夏季/Blue swimming crab.jpg", label: "野生捕撈", ecoList: ["利用蟹籠誘捕，對海底棲地破壞較拖網小。", "受限於繁殖期與甲殼寬度管制。", "請拒絕購買抱卵母蟹與體型過小的幼蟹。"] },
            { season: "夏季", seasonColor: "bg-danger", name: "北部及東部海域", pos: [24.8, 122.1], fish: "白帶魚", scientificName: "Largehead hairtail / Trichiurus lepturus", status: "需注意產量", imgSrc: "夏季/Largehead hairtail.png", label: "野生捕撈", ecoList: ["為近海重要經濟魚類，但常遭底拖網大量捕獲。", "拖網容易造成棲地破壞與大量混獲。", "建議選擇一支釣捕獲的白帶魚。"] },
            { season: "夏季", seasonColor: "bg-danger", name: "西南部海域", pos: [22.5, 120.0], fish: "刺鯧 (肉魚)", scientificName: "Pacific rudderfish / Psenopsis anomala", status: "短缺警示", imgSrc: "夏季/Pacific rudderfish.jpg", label: "野生捕撈", ecoList: ["傳統平價海鮮，但幾乎全靠底拖網捕撈。", "底拖網嚴重破壞海床生態，混獲率極高。", "近年野生體型與產量皆大幅銳減。"] },
            { season: "夏季", seasonColor: "bg-danger", name: "南部海域 (墾丁)", pos: [21.9, 120.8], fish: "鸚哥魚 (珊瑚礁魚類)", scientificName: "Parrotfish / Scaridae", status: "短缺警示", imgSrc: "夏季/Parrotfish.jpg", label: "野生捕撈", ecoList: ["以啃食珊瑚礁上的海藻為生，是維持珊瑚礁健康的「清道夫」。", "若被大量捕撈，珊瑚將被海藻覆蓋而死亡。", "具極高生態價值，應絕對拒食。"] },

            { season: "秋季", seasonColor: "bg-warning text-dark", name: "南部海域", pos: [22.6, 120.3], fish: "龍膽石斑", scientificName: "Giant grouper / Epinephelus lanceolatus", status: "供給正常", imgSrc: "秋季/秋季/Giant grouper.jpeg", label: "在地養殖", ecoList: ["體型大且生長快，為台灣高經濟養殖魚種。", "透過人工繁殖技術，不需再從野外捕捉魚苗。", "減少海洋野生大型魚類的壓力。"] },

            { season: "秋季", seasonColor: "bg-warning text-dark", name: "東部海域 (台東成功)", pos: [23.1, 121.4], fish: "旗魚 (芭蕉旗魚)", scientificName: "Indo-Pacific sailfish / Istiophorus platypterus", status: "需注意產量", imgSrc: "秋季/秋季/Indo-Pacific sailfish.jpg", label: "野生捕撈", ecoList: ["屬於海洋高階掠食者，具有重金屬累積風險。", "傳統「鏢旗魚」為極度友善、零混獲的永續漁法。", "但若為延繩釣捕獲則需注意混獲問題。"] },

        // 渲染地圖標記點的函式
        function renderMarkers(seasonFilter) {
            // 1. 清除舊的標記點
            currentMarkers.forEach(marker => map.removeLayer(marker));
            currentMarkers = [];

            // 2. 根據選擇的季節過濾資料
            let filteredRegions = regions.filter(reg => reg.season === seasonFilter);

            // 3. 重新在地圖上繪製標記點
            filteredRegions.forEach(reg => {
                // 根據季節設定圓點顏色
                let markerColor = '#0d6efd'; 
                if (reg.season === '春季') markerColor = '#198754';
                if (reg.season === '夏季') markerColor = '#dc3545';
                if (reg.season === '秋季') markerColor = '#ffc107';
                
                let marker = L.circleMarker(reg.pos, { 
                    color: markerColor, 
                    fillColor: markerColor, 
                    fillOpacity: 0.7, 
                    radius: 12 
                }).addTo(map);

                marker.on('click', () => showFishDetail(reg));
                currentMarkers.push(marker); // 存入陣列供下次清除
            });
        }

        // 點擊顯示下方詳細資訊邏輯
        function showFishDetail(data) {
            document.getElementById('emptyState').classList.add('d-none');
            const detailCard = document.getElementById('fishDetailCard');
            detailCard.classList.remove('d-none');
            
            document.getElementById('cardTitle').innerText = data.fish;
            document.getElementById('cardScientificName').innerText = data.scientificName;
            document.getElementById('cardRegion').innerText = data.name;
            document.getElementById('cardLabel').innerText = data.label;
            
            const seasonBadge = document.getElementById('cardSeasonBadge');
            seasonBadge.innerText = data.season;
            seasonBadge.className = `badge rounded-pill season-badge ${data.seasonColor}`;
            
            // 根據供給狀態切換紅/黃/綠燈
            const statusEl = document.getElementById('cardStatus');
            statusEl.innerText = data.status;
            if (data.status === "短缺警示") {
                statusEl.className = "badge bg-danger fs-6";
            } else if (data.status === "需注意產量") {
                statusEl.className = "badge bg-warning text-dark fs-6";
            } else {
                statusEl.className = "badge bg-success fs-6";
            }

            document.getElementById('cardImgContainer').innerHTML = `<img src="${data.imgSrc}" class="fish-img-large shadow-sm" alt="${data.fish}" onerror="this.src='https://placehold.co/600x400?text=Image+Not+Found';">`;
            
            const ecoListEl = document.getElementById('cardEcoList');
            ecoListEl.innerHTML = ""; 
            data.ecoList.forEach(item => {
                let li = document.createElement("li");
                li.className = "list-group-item bg-transparent ps-0 border-0 d-flex align-items-start";
                li.innerHTML = `<span class="me-2 text-success">✔️</span> <span>${item}</span>`;
                ecoListEl.appendChild(li);
            });
            
            document.getElementById('infoSection').scrollIntoView({ behavior: 'smooth' });
        }

        // 季節按鈕切換邏輯
        function updateSeason(seasonPrefix, btnElement) {
            // 切換按鈕的活躍樣式
            document.querySelectorAll('.season-btn').forEach(b => { 
                b.classList.remove('btn-primary'); 
                b.classList.add('btn-light'); 
            });
            btnElement.classList.remove('btn-light'); 
            btnElement.classList.add('btn-primary');

            // 切換季節時，隱藏目前的資訊卡，恢復提示狀態
            document.getElementById('emptyState').classList.remove('d-none');
            document.getElementById('fishDetailCard').classList.add('d-none');

            // 呼叫渲染函式 (例如傳入 '夏季')
            renderMarkers(seasonPrefix + '季');
        }

        // 網頁載入時，預設顯示「夏季」的漁獲
        window.onload = () => {
            renderMarkers('夏季');
        };

    </script>
